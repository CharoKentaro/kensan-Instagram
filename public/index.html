/* public/index.html の <script> 以降をこれに置き換えてください */

  let base64Image = "";
  let selectedPersona = "高級感と威厳のある老舗の寿司店・和食店。新鮮なネタの魅力や美しさを伝える、丁寧で品格のある口調。"; 

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      const imgEle = document.getElementById('previewImage');
      imgEle.src = event.target.result;
      imgEle.style.display = 'block';
      base64Image = event.target.result.split(',')[1];
    };
    reader.readAsDataURL(file);
  });

  const personaBtns = document.querySelectorAll('.btn-persona');
  personaBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      personaBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      selectedPersona = this.getAttribute('data-persona');
    });
  });

  // 【追加】Instagramアプリを強制的に開く賢い機能
  function openInstagramApp() {
    // スマホのInstagramアプリを起動する魔法のURL（URLスキーム）
    const appUrl = "instagram://app";
    // アプリが入ってなかった時用の通常のWebリンク
    const webUrl = "https://www.instagram.com/";

    // まずはアプリを開こうとしてみる
    window.location.href = appUrl;

    // 0.5秒待っても画面が切り替わらなければ（＝アプリが入っていなければ）、Web版を開く
    setTimeout(function() {
      window.open(webUrl, "_blank");
    }, 500);
  }

  document.getElementById('generateBtn').addEventListener('click', async function() {
    if (!base64Image) {
      alert("まずは料理の写真を選んでください！");
      return;
    }

    const checkedLangs = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
    if (checkedLangs.length === 0) {
      alert("少なくとも1つの言語を選んでください！");
      return;
    }

    const btn = document.getElementById('generateBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const resultArea = document.getElementById('resultArea');
    
    btn.disabled = true;
    loadingMsg.style.display = "block";
    resultArea.style.display = "none";

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: base64Image,
          languages: checkedLangs,
          persona: selectedPersona
        })
      });

      if (!response.ok) {
        const errorDetail = await response.text();
        throw new Error(`サーバー通信エラー: ${errorDetail}`);
      }

      const responseText = await response.text();
      
      // 【超強化】AIが余計な言葉を混ぜてきても、データ部分 { } だけを強制的に抜き出す
      const jsonMatch = responseText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        throw new Error("AIが正しいデータを作成できませんでした。");
      }
      
      const cleanJsonStr = jsonMatch[0];
      const data = JSON.parse(cleanJsonStr);

      const resultsContainer = document.getElementById('resultsContainer');
      resultsContainer.innerHTML = ""; 

      for (const [lang, text] of Object.entries(data)) {
        const box = document.createElement('div');
        box.className = 'result-box';
        
        const langTitle = document.createElement('div');
        langTitle.className = 'result-lang';
        langTitle.textContent = lang;
        
        const textArea = document.createElement('div');
        textArea.className = 'result-text';
        textArea.textContent = text;
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn-copy';
        copyBtn.textContent = '📋 この文章をコピーする';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(text).then(() => {
            alert(`【${lang}】の文章をコピーしました！`);
          });
        };

        box.appendChild(langTitle);
        box.appendChild(textArea);
        box.appendChild(copyBtn);
        resultsContainer.appendChild(box);
      }

      // 【修正】Instagramを開くボタンの動作を変更
      const instaBtn = document.querySelector('.btn-instagram');
      instaBtn.href = "#"; // 通常のリンクジャンプを無効化
      instaBtn.onclick = function(e) {
        e.preventDefault();
        openInstagramApp();
      };

      resultArea.style.display = "block";

    } catch (error) {
      console.error(error);
      alert(`エラーが発生しました。\n詳細: ${error.message}`);
    } finally {
      btn.disabled = false;
      loadingMsg.style.display = "none";
    }
  });
